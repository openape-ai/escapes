# escapes configuration — privilege elevation via OpenAPE grants
#
# Required: [security] section with allowed_issuers and allowed_approvers.
# Everything else has sensible defaults.

# host = "macmini"                             # default: system hostname
# run_as = "root"                              # default: "root"
# audit_log = "/var/log/openape/audit.log"      # default

[security]
allowed_issuers = ["https://id.openape.at"]    # REQUIRED — trusted IdP URLs
allowed_approvers = ["phofmann@delta-mind.at"] # REQUIRED — who can approve grants (≈ sudoers)
# allowed_audiences = ["escapes"]                 # default: ["escapes"]

